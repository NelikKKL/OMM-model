<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMM Studio</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --panel: #161616;
            --accent: #00e5ff;
            --text: #e0e0e0;
            --border: #262626;
            --red: #ff5252;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Панель редактора */
        .editor-side {
            width: 450px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            z-index: 2;
        }

        .toolbar {
            padding: 12px;
            background: #1c1c1c;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--border);
        }

        button, label {
            background: #2a2a2a;
            border: 1px solid var(--border);
            color: #fff;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        button:hover { border-color: var(--accent); background: #333; }
        .active { color: var(--accent); border-color: var(--accent); box-shadow: 0 0 10px rgba(0,229,255,0.2); }
        .danger { color: var(--red); }
        .danger:hover { background: #2d1a1a; border-color: var(--red); }

        textarea {
            flex-grow: 1;
            background: #0f0f0f;
            color: #80cbc4;
            border: none;
            padding: 20px;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 14px;
            resize: none;
            outline: none;
            line-height: 1.6;
        }

        /* Область просмотра */
        .preview-side {
            flex-grow: 1;
            position: relative;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0d0d0d 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        omm-model {
            width: 100%;
            height: 100%;
        }

        .overlay-info {
            position: absolute;
            top: 20px;
            right: 20px;
            text-align: right;
            pointer-events: none;
            opacity: 0.5;
            font-size: 12px;
        }

        @media (max-width: 900px) {
            .container { flex-direction: column; }
            .editor-side { width: 100%; height: 45%; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="editor-side">
        <div class="toolbar">
            <button onclick="addObj('cube3')">+ Куб</button>
            <button onclick="addObj('cube3 : 4')">+ Плита</button>
            <button onclick="addObj('image3')">+ Спрайт</button>
            <label for="tex-input">📷 Текстура</label>
            <input type="file" id="tex-input" hidden accept="image/*" onchange="uploadTex(this)">
            <button id="rotBtn" onclick="toggleRotation()">🔄 Вращение</button>
            <button class="danger" onclick="clearEditor()">🗑 Очистить</button>
            <button onclick="exportModel()" style="margin-left: auto; background: var(--accent); color: #000;">💾 .omm</button>
        </div>
        <textarea id="mainEditor" spellcheck="false">// OMM Studio Pro v2.0
cube3
scale(2)
color(0, 229, 255)
ru(20) rr(45)

image3
y(-100)
scale(1.5)
texture(https://vignette.wikia.nocookie.net/celeste/images/a/a7/Madeline_icon.png)</textarea>
    </div>

    <div class="preview-side">
        <omm-model id="viewer" autorate></omm-model>
        
        <div class="overlay-info">
            <div style="color: var(--accent); font-weight: bold;">OMM CORE ENGINE</div>
            <div>Affine Texture Mapping: ON</div>
            <div id="status">Status: Rendering</div>
        </div>
    </div>
</div>

<script>
class OmmModel extends HTMLElement {
    constructor() {
        super();
        this.attachShadow({ mode: 'open' });
        this.canvas = document.createElement('canvas');
        this.ctx = this.canvas.getContext('2d');
        this.shadowRoot.appendChild(this.canvas);
        this.camera = { z: 600, rx: 0.4, ry: 0.4 };
        this.objects = [];
        this.textures = {};
        this.focal = 600;
        this.isAnimating = false;
    }

    connectedCallback() {
        this.canvas.style.width = '100%';
        this.canvas.style.height = '100%';
        this.canvas.style.display = 'block';
        setTimeout(() => { this.resize(); this.updateModel(); }, 50);
        window.addEventListener('resize', () => this.resize());
    }

    resize() {
        this.canvas.width = this.offsetWidth;
        this.canvas.height = this.offsetHeight;
        this.render();
    }

    updateModel(text) {
        const content = text || this.textContent.trim();
        if (content.endsWith('.omm')) {
            fetch(content).then(r => r.text()).then(t => this.parse(t));
        } else {
            this.parse(content);
        }
    }

    parse(txt) {
        this.objects = [];
        let current = null;
        txt.split('\n').forEach(l => {
            l = l.trim();
            if (!l || l.startsWith('//')) return;
            if (l.startsWith('image3') || l.startsWith('cube3')) {
                let sy = 1;
                if (l.includes(':')) sy = 1/parseFloat(l.split(':')[1]);
                current = { type: l.startsWith('image3') ? 'image' : 'cube', x:0, y:0, z:0, s:50, sy, rx:0, ry:0, col:'150,150,150', tex:null };
                this.objects.push(current);
            }
            if (current) {
                const val = (k) => { const m = l.match(new RegExp(k + '\\((.*?)\\)')); return m ? m[1] : null; };
                const x = val('x'), y = val('y'), z = val('z'), s = val('scale'), rr = val('rr'), ru = val('ru'), c = val('color'), t = val('texture');
                if (x) current.x = parseFloat(x); if (y) current.y = parseFloat(y); if (z) current.z = parseFloat(z);
                if (s) current.s *= parseFloat(s); if (rr) current.ry = parseFloat(rr) * Math.PI/180;
                if (ru) current.rx = parseFloat(ru) * Math.PI/180;
                if (c) current.col = c; if (t) current.tex = this.getImg(t);
            }
        });
        this.render();
    }

    getImg(s) {
        if (this.textures[s]) return this.textures[s];
        const i = new Image(); i.src = s;
        i.onload = () => this.render();
        return this.textures[s] = i;
    }

    project(p, obj) {
        let x = p.x, y = p.y, z = p.z;
        let ty = y * Math.cos(obj.rx) - z * Math.sin(obj.rx);
        let tz = y * Math.sin(obj.rx) + z * Math.cos(obj.rx);
        let tx = x * Math.cos(obj.ry) + tz * Math.sin(obj.ry);
        tz = -x * Math.sin(obj.ry) + tz * Math.cos(obj.ry);
        tx += obj.x; ty += obj.y; tz += obj.z;
        let ry = ty * Math.cos(this.camera.rx) - tz * Math.sin(this.camera.rx);
        let rz = ty * Math.sin(this.camera.rx) + tz * Math.cos(this.camera.rx);
        let rx = tx * Math.cos(this.camera.ry) + rz * Math.sin(this.camera.ry);
        rz = -tx * Math.sin(this.camera.ry) + rz * Math.cos(this.camera.ry);
        const sc = this.focal / (this.focal + rz + this.camera.z);
        return { x: rx * sc + this.canvas.width/2, y: ry * sc + this.canvas.height/2, z: rz, sc };
    }

    drawTexturedTriangle(p1, p2, p3, u1, v1, u2, v2, u3, v3, img) {
        this.ctx.save();
        this.ctx.beginPath();
        this.ctx.moveTo(p1.x, p1.y); this.ctx.lineTo(p2.x, p2.y); this.ctx.lineTo(p3.x, p3.y);
        this.ctx.closePath(); this.ctx.clip();
        const det = (u2 - u1) * (v3 - v1) - (u3 - u1) * (v2 - v1);
        const idet = 1 / det;
        const m11 = ((p2.x - p1.x) * (v3 - v1) - (p3.x - p1.x) * (v2 - v1)) * idet;
        const m12 = ((p2.y - p1.y) * (v3 - v1) - (p3.y - p1.y) * (v2 - v1)) * idet;
        const m21 = ((p3.x - p1.x) * (u2 - u1) - (p2.x - p1.x) * (u3 - u1)) * idet;
        const m22 = ((p3.y - p1.y) * (u2 - u1) - (p2.y - p1.y) * (u3 - u1)) * idet;
        const dx = p1.x - m11 * u1 - m21 * v1;
        const dy = p1.y - m12 * u1 - m22 * v1;
        this.ctx.setTransform(m11, m12, m21, m22, dx, dy);
        this.ctx.drawImage(img, 0, 0);
        this.ctx.restore();
    }

    animate() {
        if (!this.isAnimating) return;
        this.camera.ry += 0.01;
        this.render();
        requestAnimationFrame(() => this.animate());
    }

    render() {
        this.ctx.setTransform(1,0,0,1,0,0);
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        this.objects.sort((a,b) => b.z - a.z);
        this.objects.forEach(obj => {
            const s = obj.s, sy = s * obj.sy;
            if (obj.type === 'cube') {
                const v = [{x:-s,y:-sy,z:-s},{x:s,y:-sy,z:-s},{x:s,y:sy,z:-s},{x:-s,y:sy,z:-s},
                           {x:-s,y:-sy,z:s},{x:s,y:-sy,z:s},{x:s,y:sy,z:s},{x:-s,y:sy,z:s}];
                const faces = [[0,1,2,3],[4,5,6,7],[0,1,5,4],[2,3,7,6],[0,3,7,4],[1,2,6,5]];
                const pts = v.map(p => this.project(p, obj));
                faces.forEach((f, i) => {
                    const p1 = pts[f[0]], p2 = pts[f[1]], p3 = pts[f[2]], p4 = pts[f[3]];
                    if ((p2.x-p1.x)*(p3.y-p1.y) - (p2.y-p1.y)*(p3.x-p1.x) < 0) {
                        if (obj.tex && obj.tex.complete) {
                            this.drawTexturedTriangle(p1, p2, p3, 0, 0, obj.tex.width, 0, obj.tex.width, obj.tex.height, obj.tex);
                            this.drawTexturedTriangle(p1, p3, p4, 0, 0, obj.tex.width, obj.tex.height, 0, obj.tex.height, obj.tex);
                        } else {
                            this.ctx.beginPath();
                            f.forEach((idx, j) => j==0 ? this.ctx.moveTo(pts[idx].x, pts[idx].y) : this.ctx.lineTo(pts[idx].x, pts[idx].y));
                            this.ctx.closePath();
                            const rgb = obj.col.split(',');
                            const sh = 0.6 + (i * 0.1);
                            this.ctx.fillStyle = `rgb(${rgb[0]*sh},${rgb[1]*sh},${rgb[2]*sh})`;
                            this.ctx.fill();
                        }
                    }
                });
            } else if (obj.type === 'image') {
                const v = [{x:-s,y:-sy,z:0},{x:s,y:-sy,z:0},{x:s,y:sy,z:0},{x:-s,y:sy,z:0}];
                const pts = v.map(p => this.project(p, obj));
                if (obj.tex && obj.tex.complete) {
                    this.drawTexturedTriangle(pts[0], pts[1], pts[2], 0, 0, obj.tex.width, 0, obj.tex.width, obj.tex.height, obj.tex);
                    this.drawTexturedTriangle(pts[0], pts[2], pts[3], 0, 0, obj.tex.width, obj.tex.height, 0, obj.tex.height, obj.tex);
                }
            }
        });
    }
}
customElements.define('omm-model', OmmModel);

// ЛОГИКА РЕДАКТОРА
const area = document.getElementById('mainEditor');
const view = document.getElementById('viewer');

area.addEventListener('input', () => view.updateModel(area.value));

function addObj(type) {
    area.value += `\n${type}\nx(0) y(0) z(0)\nscale(1)\ncolor(150,150,150)`;
    view.updateModel(area.value);
}

function clearEditor() {
    if(confirm("Очистить сцену?")) {
        area.value = "// Пустая сцена";
        view.updateModel(area.value);
    }
}

function toggleRotation() {
    view.isAnimating = !view.isAnimating;
    document.getElementById('rotBtn').classList.toggle('active');
    if(view.isAnimating) view.animate();
}

function uploadTex(input) {
    const reader = new FileReader();
    reader.onload = (e) => {
        area.value += `\ntexture(${e.target.result})`;
        view.updateModel(area.value);
    };
    reader.readAsDataURL(input.files[0]);
}

function exportModel() {
    const b = new Blob([area.value], {type:'text/plain'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(b);
    a.download = 'model.omm';
    a.click();
}
</script>
</body>
</html>
