<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMM Studio Pro v2.3 | Animation Update</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --panel: #161616;
            --accent: #00e5ff;
            --text: #e0e0e0;
            --border: #262626;
            --red: #ff5252;
            --stretch: #9c27b0;
            --anim: #4caf50;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }

        .container { display: flex; height: 100vh; }

        .editor-side {
            width: 450px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            z-index: 2;
        }

        .toolbar {
            padding: 12px;
            background: #1c1c1c;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--border);
            align-items: center;
        }

        select {
            background: #2a2a2a;
            border: 1px solid var(--border);
            color: var(--accent);
            padding: 6px;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
            font-size: 12px;
        }

        .stretch-tools {
            padding: 8px 12px;
            background: #1a1a1a;
            display: flex;
            gap: 5px;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
        }

        button, label {
            background: #2a2a2a;
            border: 1px solid var(--border);
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }

        button:hover { border-color: var(--accent); background: #333; }
        .btn-stretch { border-color: var(--stretch); }
        .btn-stretch:hover { background: #2d1a2d; border-color: #e040fb; }
        
        .btn-anim { border-color: var(--anim); color: var(--anim); }
        .btn-anim:hover { background: #1a2d1a; }

        .danger { color: var(--red); }
        .danger:hover { background: #2d1a1a; border-color: var(--red); }

        textarea {
            flex-grow: 1;
            background: #0f0f0f;
            color: #80cbc4;
            border: none;
            padding: 20px;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 14px;
            resize: none;
            outline: none;
            line-height: 1.6;
        }

        .preview-side {
            flex-grow: 1;
            position: relative;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0d0d0d 100%);
        }

        omm-model { width: 100%; height: 100%; }

        .overlay-info {
            position: absolute;
            top: 20px;
            right: 20px;
            text-align: right;
            pointer-events: none;
            opacity: 0.5;
            font-size: 12px;
        }

        @media (max-width: 900px) {
            .container { flex-direction: column; }
            .editor-side { width: 100%; height: 45%; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="editor-side">
        <div class="toolbar">
            <select id="shapeSelect">
                <option value="cube3">📦 Куб</option>
                <option value="pyramid3">📐 Пирамида</option>
                <option value="sphere3">🔮 Сфера</option>
                <option value="cylinder3">🧪 Цилиндр</option>
                <option value="triangle3">🔺 Треугольник</option>
                <option value="image3">🖼 Спрайт</option>
            </select>
            <button onclick="addSelectedObj()">➕ Добавить</button>
            
            <label for="tex-input">📷 Текстура</label>
            <input type="file" id="tex-input" hidden accept="image/*" onchange="uploadTex(this)">
            <button id="rotBtn" onclick="toggleRotation()">🔄 Вращение</button>
            <button class="danger" onclick="clearEditor()">🗑</button>
            <button onclick="exportModel()" style="margin-left: auto; background: var(--accent); color: #000;">💾 .omm</button>
        </div>
        <div class="stretch-tools">
            <button class="btn-stretch" onclick="addParam('ur(40)')">→ UR</button>
            <button class="btn-stretch" onclick="addParam('ul(40)')">← UL</button>
            <button class="btn-stretch" onclick="addParam('uu(40)')">↑ UU</button>
            <button class="btn-stretch" onclick="addParam('ud(40)')">↓ UD</button>
            <button class="btn-stretch" onclick="addParam('ug(40)')">↗ UG</button>
            <button class="btn-stretch" onclick="addParam('um(40)')">↙ UM</button>
            <button class="btn-anim" onclick="addParam('animation(x-100 y0 z0 rr0, x100 y-50 z200 rr180)')">✨ Анимация</button>
        </div>
        <textarea id="mainEditor" spellcheck="false">cube3
scale(1.5)
color(0, 229, 255)
animation(x-100 rr0, x100 rr360)

sphere3
y(-120)
scale(0.8)
color(255, 100, 255)
animation(y-150 scale0.5, y-100 scale1.2)</textarea>
    </div>

    <div class="preview-side">
        <omm-model id="viewer" autorate></omm-model>
        <div class="overlay-info">
            <div style="color: var(--accent); font-weight: bold;">OMM CORE v2.3</div>
            <div>Animation Engine: ACTIVE</div>
            <div id="status">Status: Online</div>
        </div>
    </div>
</div>

<script>
class OmmModel extends HTMLElement {
    constructor() {
        super();
        this.attachShadow({ mode: 'open' });
        this.canvas = document.createElement('canvas');
        this.ctx = this.canvas.getContext('2d');
        this.shadowRoot.appendChild(this.canvas);
        this.camera = { z: 600, rx: 0.4, ry: 0.4 };
        this.objects = [];
        this.textures = {};
        this.focal = 600;
        this.isAnimating = false;
        this.animRequested = false;
    }

    connectedCallback() {
        this.canvas.style.width = '100%';
        this.canvas.style.height = '100%';
        this.canvas.style.display = 'block';
        setTimeout(() => { this.resize(); this.updateModel(); }, 50);
        window.addEventListener('resize', () => this.resize());
    }

    resize() {
        this.canvas.width = this.offsetWidth || 300;
        this.canvas.height = this.offsetHeight || 300;
        this.render();
    }

    updateModel(text) {
        this.parse(text || this.textContent.trim());
        if (this.isAnimating && !this.animRequested) {
            this.animRequested = true;
            this.animate();
        }
    }

    parse(txt) {
        this.objects = [];
        this.isAnimating = this.hasAttribute('autorate');
        let current = null;

        txt.split('\n').forEach(l => {
            l = l.trim();
            if (!l || l.startsWith('//')) return;
            
            const match = l.match(/^(image3|cube3|pyramid3|triangle3|sphere3|cylinder3)/);
            if (match) {
                let typeStr = match[1];
                let sy = 1;
                if (l.includes(':')) sy = 1/parseFloat(l.split(':')[1]);
                current = { 
                    type: typeStr.replace('3', ''), 
                    x:0, y:0, z:0, s:50, baseS:50, sy, rx:0, ry:0, col:'150,150,150', tex:null,
                    ur:0, ul:0, ug:0, um:0, ud:0, uu:0 
                };
                this.objects.push(current);
            }
            if (current) {
                const val = (k) => { const m = l.match(new RegExp(k + '\\((.*?)\\)')); return m ? m[1] : null; };
                const x = val('x'), y = val('y'), z = val('z'), s = val('scale'), rr = val('rr'), ru = val('ru'), c = val('color'), t = val('texture');
                const ur = val('ur'), ul = val('ul'), ug = val('ug'), um = val('um'), ud = val('ud'), uu = val('uu');

                if (x) current.x = parseFloat(x);
                if (y) current.y = parseFloat(y);
                if (z) current.z = parseFloat(z);
                if (s) { current.baseS = 50 * parseFloat(s); current.s = current.baseS; }
                if (rr) current.ry = parseFloat(rr) * Math.PI/180;
                if (ru) current.rx = parseFloat(ru) * Math.PI/180;
                if (c) current.col = c;
                if (t) current.tex = this.getImg(t);
                
                if (ur) current.ur = parseFloat(ur); if (ul) current.ul = parseFloat(ul);
                if (ug) current.ug = parseFloat(ug); if (um) current.um = parseFloat(um);
                if (ud) current.ud = parseFloat(ud); if (uu) current.uu = parseFloat(uu);

                // Парсер новой функции анимации
                const animMatch = l.match(/animation\((.+?)\)/);
                if (animMatch) {
                    current.anim = [];
                    current.animIndex = 0;
                    current.animSpeed = 2.5;
                    const frames = animMatch[1].split(',');
                    frames.forEach(frame => {
                        const kf = {};
                        const props = frame.match(/([a-z]+)(-?[\d.]+)/g);
                        if (props) {
                            props.forEach(p => {
                                const m = p.match(/([a-z]+)(-?[\d.]+)/);
                                if (m) kf[m[1]] = parseFloat(m[2]);
                            });
                            current.anim.push(kf);
                        }
                    });
                    this.isAnimating = true;
                }
            }
        });
        this.render();
    }

    getImg(s) {
        if (this.textures[s]) return this.textures[s];
        const i = new Image(); i.src = s;
        i.onload = () => this.render();
        return this.textures[s] = i;
    }

    project(p, obj) {
        let x = p.x, y = p.y, z = p.z;
        let ty = y * Math.cos(obj.rx) - z * Math.sin(obj.rx);
        let tz = y * Math.sin(obj.rx) + z * Math.cos(obj.rx);
        let tx = x * Math.cos(obj.ry) + tz * Math.sin(obj.ry);
        tz = -x * Math.sin(obj.ry) + tz * Math.cos(obj.ry);
        tx += obj.x; ty += obj.y; tz += obj.z;
        let ry = ty * Math.cos(this.camera.rx) - tz * Math.sin(this.camera.rx);
        let rz = ty * Math.sin(this.camera.rx) + tz * Math.cos(this.camera.rx);
        let rx = tx * Math.cos(this.camera.ry) + rz * Math.sin(this.camera.ry);
        rz = -tx * Math.sin(this.camera.ry) + rz * Math.cos(this.camera.ry);
        const sc = this.focal / (this.focal + rz + this.camera.z);
        return { x: rx * sc + this.canvas.width/2, y: ry * sc + this.canvas.height/2, z: rz, sc };
    }

    drawTexturedTriangle(p1, p2, p3, u1, v1, u2, v2, u3, v3, img) {
        this.ctx.save();
        this.ctx.beginPath();
        this.ctx.moveTo(p1.x, p1.y); this.ctx.lineTo(p2.x, p2.y); this.ctx.lineTo(p3.x, p3.y);
        this.ctx.closePath(); this.ctx.clip();
        const det = (u2 - u1) * (v3 - v1) - (u3 - u1) * (v2 - v1);
        const idet = 1 / det;
        const m11 = ((p2.x - p1.x) * (v3 - v1) - (p3.x - p1.x) * (v2 - v1)) * idet;
        const m12 = ((p2.y - p1.y) * (v3 - v1) - (p3.y - p1.y) * (v2 - v1)) * idet;
        const m21 = ((p3.x - p1.x) * (u2 - u1) - (p2.x - p1.x) * (u3 - u1)) * idet;
        const m22 = ((p3.y - p1.y) * (u2 - u1) - (p2.y - p1.y) * (u3 - u1)) * idet;
        const dx = p1.x - m11 * u1 - m21 * v1;
        const dy = p1.y - m12 * u1 - m22 * v1;
        this.ctx.setTransform(m11, m12, m21, m22, dx, dy);
        this.ctx.drawImage(img, 0, 0);
        this.ctx.restore();
    }

    animate() {
        if (!this.isAnimating) { this.animRequested = false; return; }
        
        if (this.hasAttribute('autorate')) this.camera.ry += 0.01;

        this.objects.forEach(obj => {
            if (obj.anim && obj.anim.length > 0) {
                const target = obj.anim[obj.animIndex];
                const speed = obj.animSpeed;

                const tx = target.x !== undefined ? target.x : obj.x;
                const ty = target.y !== undefined ? target.y : obj.y;
                const tz = target.z !== undefined ? target.z : obj.z;
                const ts = target.scale !== undefined ? 50 * target.scale : obj.baseS;
                const trx = target.ru !== undefined ? target.ru * Math.PI/180 : obj.rx;
                const try_ = target.rr !== undefined ? target.rr * Math.PI/180 : obj.ry;

                const dx = tx - obj.x, dy = ty - obj.y, dz = tz - obj.z;
                const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);

                if (dist > speed) {
                    obj.x += (dx/dist)*speed; obj.y += (dy/dist)*speed; obj.z += (dz/dist)*speed;
                } else {
                    obj.x = tx; obj.y = ty; obj.z = tz;
                }

                // Плавный масштаб и поворот
                if (Math.abs(ts - obj.s) > 1) obj.s += Math.sign(ts - obj.s) * 1;
                if (Math.abs(trx - obj.rx) > 0.03) obj.rx += Math.sign(trx - obj.rx) * 0.03;
                if (Math.abs(try_ - obj.ry) > 0.03) obj.ry += Math.sign(try_ - obj.ry) * 0.03;

                if (dist <= speed && Math.abs(ts - obj.s) <= 1 && Math.abs(try_ - obj.ry) < 0.05) {
                    obj.animIndex = (obj.animIndex + 1) % obj.anim.length;
                }
            }
        });

        this.render();
        requestAnimationFrame(() => this.animate());
    }

    render() {
        this.ctx.setTransform(1,0,0,1,0,0);
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        this.objects.sort((a,b) => b.z - a.z);
        
        this.objects.forEach(obj => {
            const s = obj.s, sy = s * obj.sy;
            let v = [], faces = [];

            if (obj.type === 'cube') {
                v = [{x:-s,y:-sy,z:-s},{x:s,y:-sy,z:-s},{x:s,y:sy,z:-s},{x:-s,y:sy,z:-s},
                     {x:-s,y:-sy,z:s},{x:s,y:-sy,z:s},{x:s,y:sy,z:s},{x:-s,y:sy,z:s}];
                faces = [[0,1,2,3],[4,5,6,7],[0,1,5,4],[2,3,7,6],[0,3,7,4],[1,2,6,5]];
            } else if (obj.type === 'pyramid') {
                v = [{x:0,y:-sy,z:0}, {x:-s,y:sy,z:-s}, {x:s,y:sy,z:-s}, {x:s,y:sy,z:s}, {x:-s,y:sy,z:s}];
                faces = [[0,2,1], [0,3,2], [0,4,3], [0,1,4], [4,3,2,1]];
            } else if (obj.type === 'triangle') {
                v = [{x:0,y:-sy,z:0}, {x:s,y:sy,z:0}, {x:-s,y:sy,z:0}];
                faces = [[0,1,2]];
            } else if (obj.type === 'sphere') {
                const latBands = 8, longBands = 8;
                for (let lat=0; lat<=latBands; lat++) {
                    let theta = lat*Math.PI/latBands, sinTheta=Math.sin(theta), cosTheta=Math.cos(theta);
                    for (let lon=0; lon<=longBands; lon++) {
                        let phi = lon*2*Math.PI/longBands, sinPhi=Math.sin(phi), cosPhi=Math.cos(phi);
                        v.push({x: s*cosPhi*sinTheta, y: sy*cosTheta, z: s*sinPhi*sinTheta});
                    }
                }
                for (let lat=0; lat<latBands; lat++) {
                    for (let lon=0; lon<longBands; lon++) {
                        let first = (lat*(longBands+1))+lon, second = first+longBands+1;
                        faces.push([first, second, first+1]); faces.push([second, second+1, first+1]);
                    }
                }
            } else if (obj.type === 'cylinder') {
                const seg = 10;
                for (let i=0; i<seg; i++) {
                    let theta = (i/seg)*Math.PI*2;
                    v.push({x: s*Math.cos(theta), y: -sy, z: s*Math.sin(theta)});
                    v.push({x: s*Math.cos(theta), y: sy, z: s*Math.sin(theta)});
                }
                v.push({x:0, y:-sy, z:0}); v.push({x:0, y:sy, z:0});
                const tc = v.length-2, bc = v.length-1;
                for (let i=0; i<seg; i++) {
                    let currTop = i*2, currBot = i*2+1, nextTop = ((i+1)%seg)*2, nextBot = ((i+1)%seg)*2+1;
                    faces.push([currTop, nextTop, nextBot, currBot]);
                    faces.push([tc, currTop, nextTop]); faces.push([bc, nextBot, currBot]);
                }
            } else if (obj.type === 'image') {
                v = [{x:-s,y:-sy,z:0},{x:s,y:-sy,z:0},{x:s,y:sy,z:0},{x:-s,y:sy,z:0}];
            }

            v.forEach(p => {
                if (p.x > 0) p.x += obj.ur; else if (p.x < 0) p.x -= obj.ul;
                if (p.y > 0) p.y += obj.ud; else if (p.y < 0) p.y -= obj.uu;
                if (p.z > 0) p.z += obj.ug; else if (p.z < 0) p.z -= obj.um;
            });

            const pts = v.map(p => this.project(p, obj));
            if (obj.type === 'image') {
                if (obj.tex && obj.tex.complete) {
                    this.drawTexturedTriangle(pts[0], pts[1], pts[2], 0, 0, obj.tex.width, 0, obj.tex.width, obj.tex.height, obj.tex);
                    this.drawTexturedTriangle(pts[0], pts[2], pts[3], 0, 0, obj.tex.width, obj.tex.height, 0, obj.tex.height, obj.tex);
                }
                return;
            }

            faces.forEach((f, i) => {
                const p1 = pts[f[0]], p2 = pts[f[1]], p3 = pts[f[2]];
                if ((p2.x-p1.x)*(p3.y-p1.y) - (p2.y-p1.y)*(p3.x-p1.x) < 0 || obj.type === 'triangle') {
                    if (obj.tex && obj.tex.complete && f.length === 4) {
                        const p4 = pts[f[3]];
                        this.drawTexturedTriangle(p1, p2, p3, 0, 0, obj.tex.width, 0, obj.tex.width, obj.tex.height, obj.tex);
                        this.drawTexturedTriangle(p1, p3, p4, 0, 0, obj.tex.width, obj.tex.height, 0, obj.tex.height, obj.tex);
                    } else {
                        this.ctx.beginPath();
                        f.forEach((idx, j) => j==0 ? this.ctx.moveTo(pts[idx].x, pts[idx].y) : this.ctx.lineTo(pts[idx].x, pts[idx].y));
                        this.ctx.closePath();
                        const rgb = (obj.col.includes(',') ? obj.col : '150,150,150').split(',');
                        let sh = 0.5 + (i % faces.length * 0.1);
                        this.ctx.fillStyle = `rgb(${rgb[0]*sh},${rgb[1]*sh},${rgb[2]*sh})`;
                        this.ctx.fill();
                        this.ctx.strokeStyle = "rgba(0,0,0,0.2)";
                        this.ctx.stroke();
                    }
                }
            });
        });
    }
}
customElements.define('omm-model', OmmModel);

const area = document.getElementById('mainEditor');
const view = document.getElementById('viewer');

area.addEventListener('input', () => view.updateModel(area.value));

function addSelectedObj() {
    const type = document.getElementById('shapeSelect').value;
    area.value += `\n\n${type}\nx(0) y(0) z(0)\nscale(1)\ncolor(150,150,150)`;
    view.updateModel(area.value);
}

function addParam(param) {
    area.value += `\n${param}`;
    view.updateModel(area.value);
}

function clearEditor() {
    if(confirm("Очистить сцену?")) { area.value = ""; view.updateModel(""); }
}

function toggleRotation() {
    if (view.hasAttribute('autorate')) view.removeAttribute('autorate');
    else view.setAttribute('autorate', '');
    view.isAnimating = !view.isAnimating;
    document.getElementById('rotBtn').classList.toggle('active');
    view.updateModel(area.value);
}

function uploadTex(input) {
    const reader = new FileReader();
    reader.onload = (e) => {
        area.value += `\ntexture(${e.target.result})`;
        view.updateModel(area.value);
    };
    reader.readAsDataURL(input.files[0]);
}

function exportModel() {
    const b = new Blob([area.value], {type:'text/plain'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(b);
    a.download = 'model.omm';
    a.click();
}
</script>
</body>
</html>
