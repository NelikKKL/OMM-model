name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  # ── Build ─────────────────────────────────────────────────────────────────────
  build:
    name: wasm-pack build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust / Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build (release, web target)
        run: wasm-pack build --release --target web --out-dir pkg

      - name: Copy JS component into pkg/
        run: cp js/omm-component.js pkg/

      - name: Show pkg/ sizes
        run: |
          echo "=== pkg/ ==="
          ls -lh pkg/

      - name: Upload pkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg
          path: pkg/
          retention-days: 7

      # Commit pkg/ back to main so jsDelivr can serve the files
      - name: Commit pkg/ to repository
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pkg/
          git diff --cached --quiet && echo "pkg/ not changed, skipping" || (
            git commit -m "chore: update pkg [skip ci]"
            git push
          )

  # ── Release (tags vX.Y.Z only) ────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download pkg artifact
        uses: actions/download-artifact@v4
        with:
          name: pkg
          path: pkg/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pkg/omm_core_bg.wasm
            pkg/omm_core.js
            pkg/omm-component.js
          generate_release_notes: true
          body: |
            ## CDN — Rust/WASM (ESM)

            ### Один тег — полная 3D-сцена
            ```html
            <script type="module" src="https://cdn.jsdelivr.net/gh/NelikKKL/OMM-model@${{ github.ref_name }}/pkg/omm-component.js"></script>

            <omm-model src="model.omm" autorate freer></omm-model>
            ```

            ### One tag — full 3D scene
            ```html
            <script type="module" src="https://cdn.jsdelivr.net/gh/NelikKKL/OMM-model@${{ github.ref_name }}/pkg/omm-component.js"></script>

            <omm-model src="model.omm" autorate freer></omm-model>
            ```
