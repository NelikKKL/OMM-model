name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  # ── Build ────────────────────────────────────────────────────────────────────
  build:
    name: Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: npm install

      - name: Type-check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Show dist sizes
        run: |
          echo "=== dist/ ==="
          ls -lh dist/

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

      # Коммитим dist/ обратно в main, чтобы jsDelivr мог отдавать файлы
      - name: Commit dist to repository
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git diff --cached --quiet && echo "dist/ not changed, skipping" || (
            git commit -m "chore: update dist [skip ci]"
            git push
          )

  # ── Release (только при теге vX.Y.Z) ─────────────────────────────────────────
  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/omm-core.js
            dist/omm-core.min.js
            dist/omm-core.esm.js
          generate_release_notes: true
          body: |
            ## CDN

            ### Script tag
            ```html
            <script src="https://cdn.jsdelivr.net/gh/NelikKKL/OMM-model@${{ github.ref_name }}/dist/omm-core.min.js"></script>
            ```

            ### ESM
            ```js
            import 'https://cdn.jsdelivr.net/gh/NelikKKL/OMM-model@${{ github.ref_name }}/dist/omm-core.esm.js';
            ```
